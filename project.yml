name: Scrollapp

options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    DEVELOPMENT_TEAM: H9M8KNW35G
    CODE_SIGN_STYLE: Automatic

targets:
  Scrollapp:
    type: application
    platform: macOS
    sources:
      - path: Scrollapp
        excludes:
          - Info.plist
          - Scrollapp.entitlements
    postBuildScripts:
      - name: Strip Extended Attributes
        script: |
          if [ -n "${CODESIGNING_FOLDER_PATH:-}" ] && [ -e "$CODESIGNING_FOLDER_PATH" ]; then
            /usr/bin/xattr -cr "$CODESIGNING_FOLDER_PATH" || true
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fromis9.scrollapp
        PRODUCT_NAME: Scrollapp
        INFOPLIST_FILE: Scrollapp/Info.plist
        CODE_SIGN_ENTITLEMENTS: Scrollapp/Scrollapp.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: NO

  ScrollappTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ScrollappTests
    dependencies:
      - target: Scrollapp
    settings:
      base:
        PRODUCT_NAME: ScrollappTests
        PRODUCT_BUNDLE_IDENTIFIER: com.fromis9.scrollappTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Scrollapp.app/Contents/MacOS/Scrollapp"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Scrollapp:
    build:
      targets:
        Scrollapp: all
        ScrollappTests: [test]
    test:
      gatherCoverageData: false
      targets:
        - name: ScrollappTests
